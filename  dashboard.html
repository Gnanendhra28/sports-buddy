<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - Sports Buddy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Sports Buddy Dashboard</h1>
        <button id="logout-button">Logout</button>
    </header>

    <main class="container">
        <div id="user-info">
            Welcome, <span id="user-email"></span>!
        </div>

        <section id="create-event">
            <h2>Add Sports Event </h2>
            <input type="text" id="event-name" placeholder="Sports Event Name (e.g., Evening Tennis)">
            <input type="text" id="event-location" placeholder="Location (e.g., City Park Courts)">
            <input type="datetime-local" id="event-time">
            <button id="add-event-button">Add Event</button>
        </section>

        <section id="my-events">
            <h2>My Upcoming Events</h2>
            <div id="events-list"></div>
        </section>
    </main>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/dashboard.js"></script>
    
</body>
</html>
